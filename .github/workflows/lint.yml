name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Fail on merge conflict markers
        run: |
          python - <<'PY'
          from __future__ import annotations

          import pathlib
          import sys

          markers = ("<<<<<<<", "=======", ">>>>>>>")
          matches: list[tuple[str, int, str]] = []

          allowed_suffixes = {".py", ".yml", ".yaml", ".md"}
          excluded_dirs = {
              ".git",
              ".venv",
              ".venv-build",
              "__pycache__",
              "htmlcov",
              "build",
              "dist",
              "node_modules",
          }

          for path in pathlib.Path(".").rglob("*"):
              if path.is_dir():
                  continue
              if path.suffix not in allowed_suffixes:
                  continue
              if any(part in excluded_dirs for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding="utf-8", errors="replace").splitlines()
              except OSError:
                  continue
              for i, line in enumerate(text, start=1):
                  stripped = line.lstrip()
                  if stripped.startswith(markers):
                      matches.append((str(path), i, stripped.strip()))

          if matches:
              print("Found git merge conflict markers in tracked sources:")
              for p, i, line in matches[:50]:
                  print(f"- {p}:{i}: {line}")
              if len(matches) > 50:
                  print(f"...and {len(matches) - 50} more")
              sys.exit(1)
          print("No merge conflict markers found.")
          PY
      
      - name: Ruff + mypy
        run: |
          python scripts/run_linting.py
