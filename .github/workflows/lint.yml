name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff flake8

    - name: Fail on merge conflict markers
      run: |
        python - <<'PY'
        from __future__ import annotations

        import pathlib
        import sys

        markers = ("<<<<<<<", "=======", ">>>>>>>")
        matches: list[tuple[str, int, str]] = []

        for path in pathlib.Path(".").rglob("*.py"):
          if any(part in {".venv", "__pycache__"} for part in path.parts):
            continue
          try:
            text = path.read_text(encoding="utf-8", errors="replace").splitlines()
          except OSError:
            continue
          for i, line in enumerate(text, start=1):
            if line.startswith(markers):
              matches.append((str(path), i, line.strip()))

        if matches:
          print("Found git merge conflict markers in tracked sources:")
          for p, i, line in matches[:50]:
            print(f"- {p}:{i}: {line}")
          if len(matches) > 50:
            print(f"...and {len(matches) - 50} more")
          sys.exit(1)
        print("No merge conflict markers found.")
        PY
    
    - name: Run ruff
      run: |
        ruff check .
    
    - name: Run flake8
      run: |
        flake8 src/ tests/ main.py demo_workflow.py --max-line-length=120 --statistics
