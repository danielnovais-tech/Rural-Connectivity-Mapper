# Ruff configuration
# https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py38"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]

ignore = [
    "E501", # line-length handled by formatter; flake8 already ignores this
    "W291", # trailing whitespace (often in embedded HTML/docstrings)
    "W293", # blank line contains whitespace (often in embedded HTML/docstrings)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"src/models/*.py" = ["N999"]
