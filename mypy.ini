[mypy]
python_version = 3.12
ignore_missing_imports = True
warn_unused_ignores = True
show_error_codes = True
disable_error_code = import-untyped

; The project contains several intentionally dynamic/loosely-typed modules.
; Keep mypy useful for the rest of the codebase by ignoring errors in these.
[mypy-src.utils.country_config]
ignore_errors = True

[mypy-src.pipeline.gold]
ignore_errors = True

[mypy-src.utils.ml_utils]
ignore_errors = True

[mypy-src.utils.analysis_utils]
ignore_errors = True

[mypy-src.utils.starlink_api]
ignore_errors = True

[mypy-src.utils.ibge_utils]
ignore_errors = True

[mypy-src.utils.anatel_utils]
ignore_errors = True